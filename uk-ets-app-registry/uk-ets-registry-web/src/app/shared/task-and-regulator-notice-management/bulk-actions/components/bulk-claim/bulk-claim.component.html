<form [formGroup]="form">
  <h1 class="govuk-heading-xl">Claim {{ itemTypeLabel() }}</h1>
  <app-form-comment-area
    controlName="comment"
    label="Explain why you're claiming this {{ itemTypeLabel() }}{{
      someRequestsClaimed() ? '' : ' (optional)'
    }}"
  />
  <button
    id="submit"
    class="govuk-button submit-form"
    data-module="govuk-button"
    data-prevent-double-click="true"
    (click)="submit()"
  >
    Claim {{ itemTypeLabel() }}
  </button>
</form>
